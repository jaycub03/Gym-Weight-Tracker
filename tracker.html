<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Overload">
<meta name="theme-color" content="#0a0a0a">
<title>Overload Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --accent: #c8ff47;
  --red: #ff4f4f;
  --blue: #47b8ff;
  --text: #f0f0f0;
  --muted: #666;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* HEADER */
header {
  padding: calc(var(--safe-top) + 16px) 16px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--accent);
  line-height: 1;
}

.week-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
}

.week-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 5px;
}

.wk {
  height: 38px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  font-weight: 500;
}

.wk.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.wk.has-data { border-color: #404040; color: #999; }

/* BOTTOM NAV */
.bottom-nav {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--bg);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
}

.nav-btn {
  flex: 1;
  padding: 14px 8px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-align: center;
  cursor: pointer;
  background: none;
  border: none;
  transition: color 0.15s;
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.nav-btn .nav-icon { font-size: 18px; }
.nav-btn.active { color: var(--accent); }

/* SCROLL AREA */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 14px 20px;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}

.stat .lbl {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 4px;
  text-transform: uppercase;
}

.stat .val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 1px;
  line-height: 1;
}

.val.g { color: var(--accent); }
.val.r { color: var(--red); }
.val.b { color: var(--blue); }

/* DAY HEADER */
.day-header {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* CARDS */
.cards { display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  transition: border-color 0.2s;
}

.card.logged-hit { border-left: 4px solid var(--accent); }
.card.logged-close { border-left: 4px solid var(--blue); }
.card.logged-missed { border-left: 4px solid var(--red); }

.ex-name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 3px;
}

.ex-meta {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

.target-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.target-row .t-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

.target-row .t-val {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 1px;
}

.inputs-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.inp-group label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.inp {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  font-weight: 500;
}

.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: #333; font-size: 18px; }

.btn-row { display: flex; gap: 8px; }

.log-btn {
  flex: 1;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 2px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
  text-transform: uppercase;
}

.log-btn:active { opacity: 0.7; }

.clear-btn {
  background: none;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.clear-btn:active { border-color: var(--red); color: var(--red); }

.result {
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  display: none;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.5px;
}

.result.show { display: flex; }
.result.hit { background: rgba(200,255,71,0.08); border: 1px solid rgba(200,255,71,0.25); color: var(--accent); }
.result.close { background: rgba(71,184,255,0.08); border: 1px solid rgba(71,184,255,0.25); color: var(--blue); }
.result.missed { background: rgba(255,79,79,0.08); border: 1px solid rgba(255,79,79,0.25); color: var(--red); }
.rdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.hit .rdot { background: var(--accent); }
.close .rdot { background: var(--blue); }
.missed .rdot { background: var(--red); }

/* HISTORY */
.hist-section { margin-bottom: 14px; }

.hist-name {
  font-size: 13px;
  font-weight: 600;
  padding: 12px 14px;
  background: var(--surface2);
  border-radius: 12px 12px 0 0;
  border: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hist-name span {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  background: var(--surface);
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
}

.hist-rows {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 12px 12px;
  overflow: hidden;
}

.hist-row {
  display: grid;
  grid-template-columns: 44px 1fr 1fr 36px;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  align-items: center;
}

.hist-row:last-child { border-bottom: none; }
.hist-hdr { background: var(--surface2); color: var(--muted); font-size: 9px; letter-spacing: 1px; }
.wk-num { color: var(--muted); font-size: 10px; }
.target-val { color: var(--muted); font-size: 10px; }
.s-hit { color: var(--accent); font-size: 16px; }
.s-close { color: var(--blue); font-size: 16px; }
.s-missed { color: var(--red); font-size: 16px; }
.s-empty { color: #333; }

.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">OVERLOAD</div>
    <div class="week-label">WEEK <span id="currentWeekLabel">1</span> / 12</div>
  </div>
  <div class="week-grid" id="weekGrid"></div>
</header>

<div class="scroll-area" id="scrollArea">
  <div class="stats">
    <div class="stat"><div class="lbl">HIT</div><div class="val g" id="sHit">—</div></div>
    <div class="stat"><div class="lbl">MISSED</div><div class="val r" id="sMissed">—</div></div>
    <div class="stat"><div class="lbl">LOGGED</div><div class="val b" id="sTotal">—</div></div>
  </div>
  <div id="tab-thu"></div>
  <div id="tab-fri" class="hidden"></div>
  <div id="tab-tue" class="hidden"></div>
  <div id="tab-hist" class="hidden"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('thu')">
    <span class="nav-icon">💪</span>THU
  </button>
  <button class="nav-btn" onclick="switchTab('fri')">
    <span class="nav-icon">🏋️</span>FRI
  </button>
  <button class="nav-btn" onclick="switchTab('tue')">
    <span class="nav-icon">⚡</span>TUE
  </button>
  <button class="nav-btn" onclick="switchTab('hist')">
    <span class="nav-icon">📊</span>HIST
  </button>
</nav>

<script>
const WEEKS = 12;
let currentWeek = 1;
let currentTab = 'thu';
let logs = {};
try { logs = JSON.parse(localStorage.getItem('overload_logs') || '{}'); } catch(e) { logs = {}; }

const PLAN = {
  thu: {
    label: "THURSDAY — PUSH — HEAVY",
    exercises: [
      { id:"incline_db", name:"Incline DB Press", meta:"4x5-7 · Heavy · Rest 2-3 min",
        targets:["70x5","70x6","70x7","75x5","75x6","75x7","80x5","80x6","80x7","85x5","85x6","85x7"] },
      { id:"flat_machine", name:"Flat Machine Press", meta:"3x8-10 · Moderate · Rest 90s",
        targets:["160x8","160x9","160x10","170x8","170x9","170x10","180x8","180x9","180x10","190x8","190x9","190x10"] },
      { id:"pec_deck", name:"Pec Deck", meta:"3x12-15 · Light · Rest 60s",
        targets:["150x12","150x13","150x15","160x12","160x13","160x15","170x12","170x13","170x15","180x12","180x13","180x15"] },
      { id:"lat_raise_thu", name:"Cable Lateral Raise", meta:"4x12-15 · Light · Rest 60s",
        targets:["20x12","20x13","20x15","22.5x12","22.5x13","22.5x15","25x12","25x13","25x15","27.5x12","27.5x13","27.5x15"] },
      { id:"oh_ext_thu", name:"Overhead Tricep Extension", meta:"2x12-15 · Rope · Rest 60s",
        targets:["115x12","115x13","115x15","120x12","120x13","120x15","125x12","125x13","125x15","130x12","130x13","130x15"] },
      { id:"pushdown_thu", name:"Cable Pushdown", meta:"2x12-15 · Straight Bar · Rest 60s",
        targets:["150x12","150x13","150x15","160x12","160x13","160x15","170x12","170x13","170x15","180x12","180x13","180x15"] },
    ]
  },
  fri: {
    label: "FRIDAY — PULL — HEAVY",
    exercises: [
      { id:"cs_row", name:"Chest Supported Row", meta:"4x5-7 · Heavy · Rest 2-3 min",
        targets:["135x5","135x6","135x7","145x5","145x6","145x7","155x5","155x6","155x7","165x5","165x6","165x7"] },
      { id:"wide_pull_fri", name:"Wide Grip Pulldown", meta:"3x8-10 · Moderate · Rest 90s",
        targets:["160x8","160x9","160x10","170x8","170x9","170x10","180x8","180x9","180x10","190x8","190x9","190x10"] },
      { id:"underhand_pull", name:"Underhand Pulldown", meta:"3x10-12 · Moderate · Rest 90s",
        targets:["100x10","100x11","100x12","110x10","110x11","110x12","120x10","120x11","120x12","130x10","130x11","130x12"] },
      { id:"face_pull", name:"High Cable Face Pull", meta:"3x15-20 · Rope · Rest 60s",
        targets:["50x15","50x17","50x20","55x15","55x17","55x20","60x15","60x17","60x20","65x15","65x17","65x20"] },
      { id:"incline_curl", name:"Incline DB Curl", meta:"2x8-10 · Moderate · Rest 90s",
        targets:["22.5x8","22.5x9","22.5x10","25x8","25x9","25x10","27.5x8","27.5x9","27.5x10","30x8","30x9","30x10"] },
      { id:"preacher_curl", name:"Preacher Curl", meta:"2x12-15 · Light · Rest 60s",
        targets:["45x12","45x13","45x15","50x12","50x13","50x15","55x12","55x13","55x15","60x12","60x13","60x15"] },
    ]
  },
  tue: {
    label: "TUESDAY — UPPER — MODERATE",
    exercises: [
      { id:"cable_fly", name:"Low to High Cable Fly", meta:"3x12-15 · Light · Rest 60s",
        targets:["find weight x12","same x13","same x15","+5lbs x12","+5lbs x13","+5lbs x15","+5lbs x12","+5lbs x13","+5lbs x15","+5lbs x12","+5lbs x13","+5lbs x15"] },
      { id:"wide_pull_tue", name:"Wide Grip Pulldown", meta:"3x10-12 · Moderate · Rest 90s",
        targets:["140x10","140x11","140x12","150x10","150x11","150x12","160x10","160x11","160x12","170x10","170x11","170x12"] },
      { id:"vbar_row", name:"V-Bar Cable Row", meta:"3x10-12 · Moderate · Rest 90s",
        targets:["find weight x10","same x11","same x12","+10lbs x10","+10lbs x11","+10lbs x12","+10lbs x10","+10lbs x11","+10lbs x12","+10lbs x10","+10lbs x11","+10lbs x12"] },
      { id:"lat_raise_tue", name:"Cable Lateral Raise", meta:"3x15-20 · Light · Rest 60s",
        targets:["20x15","20x17","20x20","22.5x15","22.5x17","22.5x20","25x15","25x17","25x20","27.5x15","27.5x17","27.5x20"] },
      { id:"hammer_curl", name:"Cable Hammer Curl", meta:"2x10-12 · Light · Rest 60s",
        targets:["90x10","90x11","90x12","100x10","100x11","100x12","110x10","110x11","110x12","120x10","120x11","120x12"] },
      { id:"oh_ext_tue", name:"Overhead Tricep Extension", meta:"2x12-15 · Rope · Rest 60s",
        targets:["110x12","110x13","110x15","115x12","115x13","115x15","120x12","120x13","120x15","125x12","125x13","125x15"] },
      { id:"pushdown_tue", name:"Cable Pushdown", meta:"2x12-15 · Straight Bar · Rest 60s",
        targets:["135x12","135x13","135x15","140x12","140x13","140x15","145x12","145x13","145x15","150x12","150x13","150x15"] },
      { id:"cable_crunch", name:"Cable Crunch", meta:"3x10-12 · Heavy · Rest 60s",
        targets:["150x10","150x11","150x12","160x10","160x11","160x12","170x10","170x11","170x12","180x10","180x11","180x12"] },
      { id:"leg_raise", name:"Hanging Leg Raise", meta:"3x10-15 · Bodyweight · Rest 60s",
        targets:["BWx10","BWx11","BWx12","BWx12","BWx13","BWx15","BWx13","BWx14","BWx15","BWx14","BWx15","BWx15"] },
    ]
  }
};

function save() { try { localStorage.setItem('overload_logs', JSON.stringify(logs)); } catch(e) {} }
function getLog(w, id) { return logs[`w${w}_${id}`] || null; }
function setLog(w, id, weight, reps) { logs[`w${w}_${id}`] = { weight, reps }; save(); }
function delLog(w, id) { delete logs[`w${w}_${id}`]; save(); }

function parseTarget(t) {
  if (!t || t.includes('find') || t.includes('same') || t.includes('+') || t.startsWith('BW')) return null;
  const p = t.split('x');
  if (p.length < 2) return null;
  return { weight: parseFloat(p[0]), reps: parseInt(p[1]) };
}

function getStatus(target, lw, lr) {
  const t = parseTarget(target);
  if (!t) return 'hit';
  if (lw >= t.weight && lr >= t.reps) return 'hit';
  if (lw >= t.weight * 0.95 && lr >= t.reps - 1) return 'close';
  return 'missed';
}

function statusMsg(s) {
  if (s === 'hit') return '✓ Target hit — great work';
  if (s === 'close') return '~ Almost — repeat this weight next week';
  return '✗ Missed — repeat same weight next week';
}

function buildWeekGrid() {
  const g = document.getElementById('weekGrid');
  g.innerHTML = '';
  document.getElementById('currentWeekLabel').textContent = currentWeek;
  for (let w = 1; w <= WEEKS; w++) {
    const b = document.createElement('button');
    b.className = 'wk' + (w === currentWeek ? ' active' : '');
    const hasData = Object.keys(logs).some(k => k.startsWith(`w${w}_`));
    if (hasData && w !== currentWeek) b.classList.add('has-data');
    b.textContent = w;
    b.onclick = () => { currentWeek = w; buildWeekGrid(); renderCurrentTab(); updateStats(); document.getElementById('scrollArea').scrollTop = 0; };
    g.appendChild(b);
  }
}

function renderTab(key) {
  const day = PLAN[key];
  const el = document.getElementById(`tab-${key}`);
  el.innerHTML = `<div class="day-header">${day.label}</div><div class="cards" id="cards-${key}"></div>`;
  const cards = document.getElementById(`cards-${key}`);

  day.exercises.forEach(ex => {
    const target = ex.targets[currentWeek - 1];
    const logged = getLog(currentWeek, ex.id);
    const status = logged ? getStatus(target, logged.weight, logged.reps) : null;

    const c = document.createElement('div');
    c.className = 'card' + (status ? ` logged-${status}` : '');

    c.innerHTML = `
      <div class="ex-name">${ex.name}</div>
      <div class="ex-meta">${ex.meta}</div>
      <div class="target-row">
        <div class="t-lbl">WEEK ${currentWeek} TARGET</div>
        <div class="t-val">${target}</div>
      </div>
      <div class="inputs-row">
        <div class="inp-group">
          <label>WEIGHT (lbs)</label>
          <input class="inp" id="w-${ex.id}" type="number" inputmode="decimal" step="0.5" placeholder="lbs" value="${logged ? logged.weight : ''}">
        </div>
        <div class="inp-group">
          <label>REPS</label>
          <input class="inp" id="r-${ex.id}" type="number" inputmode="numeric" placeholder="reps" value="${logged ? logged.reps : ''}">
        </div>
      </div>
      <div class="btn-row">
        <button class="log-btn" onclick="doLog('${key}','${ex.id}','${target}')">LOG SET</button>
        ${logged ? `<button class="clear-btn" onclick="doClear('${key}','${ex.id}')">✕</button>` : ''}
      </div>
      <div class="result ${status ? status + ' show' : ''}" id="res-${ex.id}">
        <div class="rdot"></div>
        <span>${status ? statusMsg(status) : ''}</span>
      </div>
    `;
    cards.appendChild(c);
  });
}

function doLog(key, id, target) {
  const w = parseFloat(document.getElementById(`w-${id}`).value);
  const r = parseInt(document.getElementById(`r-${id}`).value);
  if (!w || !r) { alert('Enter weight and reps first'); return; }
  setLog(currentWeek, id, w, r);
  renderTab(key);
  updateStats();
  buildWeekGrid();
}

function doClear(key, id) {
  delLog(currentWeek, id);
  renderTab(key);
  updateStats();
  buildWeekGrid();
}

function renderHistory() {
  const el = document.getElementById('tab-hist');
  const allEx = [...PLAN.thu.exercises, ...PLAN.fri.exercises, ...PLAN.tue.exercises];
  const dayLabel = id => PLAN.thu.exercises.find(e=>e.id===id)?'THU':PLAN.fri.exercises.find(e=>e.id===id)?'FRI':'TUE';

  let html = '<div class="day-header">ALL EXERCISES — 12 WEEK HISTORY</div>';
  allEx.forEach(ex => {
    html += `<div class="hist-section">
      <div class="hist-name">${ex.name}<span>${dayLabel(ex.id)}</span></div>
      <div class="hist-rows">
        <div class="hist-row hist-hdr"><div>WK</div><div>TARGET</div><div>ACTUAL</div><div></div></div>`;
    for (let w = 1; w <= WEEKS; w++) {
      const t = ex.targets[w-1];
      const lg = getLog(w, ex.id);
      let actual = `<span class="s-empty">—</span>`;
      let stat = `<span class="s-empty">—</span>`;
      if (lg) {
        const s = getStatus(t, lg.weight, lg.reps);
        actual = `${lg.weight}×${lg.reps}`;
        const cls = s==='hit'?'s-hit':s==='close'?'s-close':'s-missed';
        const icon = s==='hit'?'✓':s==='close'?'~':'✗';
        stat = `<span class="${cls}">${icon}</span>`;
      }
      html += `<div class="hist-row"><div class="wk-num">W${w}</div><div class="target-val">${t}</div><div style="font-size:11px">${actual}</div><div>${stat}</div></div>`;
    }
    html += `</div></div>`;
  });
  el.innerHTML = html;
}

function updateStats() {
  const allEx = [...PLAN.thu.exercises, ...PLAN.fri.exercises, ...PLAN.tue.exercises];
  let hit=0, missed=0, total=0;
  allEx.forEach(ex => {
    const lg = getLog(currentWeek, ex.id);
    if (lg) {
      total++;
      const s = getStatus(ex.targets[currentWeek-1], lg.weight, lg.reps);
      if (s==='hit') hit++;
      else if (s==='missed') missed++;
    }
  });
  document.getElementById('sHit').textContent = total ? hit : '—';
  document.getElementById('sMissed').textContent = total ? missed : '—';
  document.getElementById('sTotal').textContent = total || '—';
}

function switchTab(key) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const tabs = ['thu','fri','tue','hist'];
  document.querySelectorAll('.nav-btn')[tabs.indexOf(key)].classList.add('active');
  tabs.forEach(t => document.getElementById(`tab-${t}`).classList.toggle('hidden', t!==key));
  currentTab = key;
  document.getElementById('scrollArea').scrollTop = 0;
  if (key==='hist') renderHistory();
  else renderTab(key);
}

function renderCurrentTab() {
  if (currentTab==='hist') renderHistory();
  else renderTab(currentTab);
}

buildWeekGrid();
renderTab('thu');
updateStats();
</script>
</body>
</html>
